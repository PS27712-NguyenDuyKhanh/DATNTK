<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FoodEcommerce Auth</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f5f5f5;
        }

        .container-box {
            max-width: 500px;
            margin-top: 50px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>

</head>

<body>

    <div class="container">

        <h2 class="text-center mt-4">FoodEcommerce Auth</h2>

        <ul class="nav nav-tabs justify-content-center mt-4">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">
                    Login
                </button>
            </li>

            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">
                    Register
                </button>
            </li>
        </ul>

        <div class="tab-content">

            <!-- LOGIN -->

            <div class="tab-pane fade show active" id="login">

                <div class="container-box">

                    <h4 class="mb-3">Login</h4>

                    <input id="loginPhone" class="form-control mb-2" placeholder="Phone Number">

                    <input id="loginPassword" type="password" class="form-control mb-3" placeholder="Password">

                    <button class="btn btn-primary w-100" onclick="login()">
                        Login
                    </button>

                </div>

            </div>

            <!-- REGISTER -->

            <div class="tab-pane fade" id="register">

                <div class="container-box">

                    <h4 class="mb-3">Register</h4>

                    <input id="regUserName" class="form-control mb-2" placeholder="User Name">

                    <input id="regEmail" class="form-control mb-2" placeholder="Email">

                    <div class="input-group mb-2">

                        <input id="regOtp" class="form-control" placeholder="OTP">

                        <button class="btn btn-secondary" onclick="sendOtp()">
                            Send OTP
                        </button>

                    </div>

                    <input id="regPhone" class="form-control mb-2" placeholder="Phone Number">

                    <input id="regPassword" type="password" class="form-control mb-3" placeholder="Password">

                    <button class="btn btn-success w-100" onclick="register()">

                        Register

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        const API = "http://localhost:8081/api/auth"

        async function login() {

            const data = {

                phoneNumber: document.getElementById("loginPhone").value,
                password: document.getElementById("loginPassword").value

            };

            try {

                const res = await fetch(API + "/login", {

                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(data)

                });

                const result = await res.json();

                console.log(result);

                if (result.accessToken) {

                    alert("Login success");

                    localStorage.setItem("token", result.accessToken);

                } else {

                    alert("Sai tài khoản hoặc mật khẩu");

                }

            } catch (e) {

                console.log(e);

            }

        }



        async function sendOtp() {

            const email = document.getElementById("regEmail").value;

            try {

                const res = await fetch(API + "/send-otp?email=" + email, {
                    method: "POST"
                });

                const data = await res.json();

                alert(data.message);

            } catch (e) {

                console.log(e);

            }

        }



        async function register() {

            const data = {

                userName: document.getElementById("regUserName").value,

                email: document.getElementById("regEmail").value,

                phoneNumber: document.getElementById("regPhone").value,

                password: document.getElementById("regPassword").value,

                otp: document.getElementById("regOtp").value

            };

            try {

                const res = await fetch(API + "/register", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(data)

                });

                const result = await res.json();

                console.log(result);

                alert("Register success");

            } catch (e) {

                console.log(e);

            }

        }

    </script>

</body>

</html>
