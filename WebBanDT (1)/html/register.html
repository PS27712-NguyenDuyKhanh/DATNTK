<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="container">

        <div class="login-box">

            <h2>Đăng ký tài khoản</h2>

            <div id="message"></div>

            <!-- STEP 1 EMAIL -->

            <div id="step1">

                <p class="status">Nhập email để đăng ký</p>

                <div class="input-box">
                    <input type="email" id="email" placeholder="Nhập email">
                </div>

                <button class="btn-login" onclick="sendOtp()">
                    Tiếp tục
                </button>

            </div>


            <!-- STEP 2 OTP -->

            <div id="step2" style="display:none;">

                <p class="status">Nhập mã OTP đã gửi tới email</p>

                <div class="input-box">
                    <input type="text" id="otp" placeholder="Nhập mã OTP">
                </div>

                <button class="btn-login" onclick="verifyOtp()">
                    Xác nhận OTP
                </button>

            </div>


            <!-- STEP 3 PASSWORD -->

            <div id="step3" style="display:none;">

                <p class="status">Tạo mật khẩu đăng nhập</p>

                <div class="input-box">
                    <input type="password" id="password" placeholder="Nhập mật khẩu">
                </div>

                <div class="input-box">
                    <input type="password" id="confirm" placeholder="Xác nhận mật khẩu">
                </div>

                <button class="btn-login" onclick="createPassword()">
                    Hoàn tất đăng ký
                </button>

            </div>

            <a href="login.html" class="link-login">
                Đã có tài khoản? Đăng nhập
            </a>

        </div>

    </div>

    <script src="../js/register.js"></script>

</body>

</html>
