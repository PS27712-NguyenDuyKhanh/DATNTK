<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Thông tin cá nhân</title>

<link rel="stylesheet" href="../css/home.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

.profile-form{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.profile-form h3{
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    font-weight:600;
    margin-bottom:5px;
}

.form-group input{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

.btn-save{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

.btn-save:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<header class="header">

<div class="header-container">

<a href="home.html" class="logo">
<img src="../img/logo.jpg">
<span>PhoneShop</span>
</a>

<div class="search-box">
<input type="text" placeholder="Tìm điện thoại...">
<button><i class="fa fa-search"></i></button>
</div>

<a href="cart.html" class="cart">
<i class="fa-solid fa-cart-shopping"></i>
</a>

<a href="login.html" class="btn-header" id="btnLogin">
<i class="fa-solid fa-user"></i> Đăng nhập
</a>

<span class="user-name" id="userName"></span>

<button id="btnLogout" class="btn-logout">
<i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
</button>

</div>

</header>

<section class="profile-page">

<div class="profile-container">

<div class="sidebar">

<a href="profile.html">
<i class="fa-solid fa-house"></i>
Tổng quan
</a>

<a class="active">
<i class="fa-solid fa-user"></i>
Thông tin tài khoản
</a>

</div>

<div class="content">

<div class="profile-form">

<h3>Thông tin cá nhân</h3>

<div id="message"></div>

<div class="form-group">
<label>Email</label>
<input type="text" id="email" readonly>
</div>

<div class="form-group">
<label>Tên người dùng</label>
<input type="text" id="username">
</div>

<div class="form-group">
<label>Số điện thoại</label>
<input type="text" id="phone">
</div>

<div class="form-group">
<label>Địa chỉ</label>
<input type="text" id="address">
</div>

<button class="btn-save" onclick="updateProfile()">Cập nhật</button>

</div>

</div>

</div>

</section>

<footer class="footer">

<div class="footer-grid">

<div>
<h4>PhoneShop</h4>
<p>Điện thoại chính hãng 100%</p>
</div>

<div>
<h4>Liên kết</h4>
<a href="#">Trang chủ</a>
<a href="#">Sản phẩm</a>
</div>

<div>
<h4>Liên hệ</h4>
<p>📞 0123 456 789</p>
<p>📍 TP. Hồ Chí Minh</p>
</div>

</div>

</footer>

<script src="../js/home.js"></script>
<script src="../js/profile-info.js"></script>

<script>window.onload = loadProfile;
</script>

</body>
</html>
