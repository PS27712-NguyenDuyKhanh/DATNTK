<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="../css/admin.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <h2 class="logo">PhoneShop</h2>

            <ul>

                <li class="active">
                    <a href="admin.html">
                        <i class="fa fa-chart-line"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="Acount.html">
                        <i class="fa fa-user"></i>
                        Quản lý tài khoản
                    </a>
                </li>

                <li>
                    <a href="product.html">
                        <i class="fa fa-mobile"></i>
                        Quản lý sản phẩm
                    </a>
                </li>

                <li>
                    <a href="order.html">
                        <i class="fa fa-box"></i>
                        Quản lý đơn hàng
                    </a>
                </li>

                <li>
                    <a href="inventory.html">
                        <i class="fa fa-warehouse"></i>
                        Quản lý kho
                    </a>
                </li>

                <li>
                    <a href="coupon.html">
                        <i class="fa fa-ticket"></i>
                        Mã giảm giá
                    </a>
                </li>

                <li>
                    <a href="review.html">
                        <i class="fa-solid fa-star"></i>
                        Đánh giá
                    </a>
                </li>

            </ul>

            <button class="logout">
                <i class="fa fa-sign-out"></i>
                Đăng xuất
            </button>

        </div>


        <!-- MAIN -->
        <div class="main">

            <!-- TOPBAR -->
            <div class="topbar">

                <input type="text" placeholder="Tìm kiếm...">

                <div class="admin">
                    <img src="">
                    <span>Admin</span>
                </div>

            </div>


            <!-- DASHBOARD CARDS -->
            <div class="cards">

                <div class="card revenue">

                    <div class="card-icon">
                        <i class="fa fa-dollar-sign"></i>
                    </div>

                    <div class="card-info">
                        <h3>Doanh thu</h3>
                        <p>120.000.000đ</p>
                    </div>

                </div>


                <div class="card orders">

                    <div class="card-icon">
                        <i class="fa fa-shopping-cart"></i>
                    </div>

                    <div class="card-info">
                        <h3>Đơn hàng</h3>
                        <p>350</p>
                    </div>

                </div>


                <div class="card products">

                    <div class="card-icon">
                        <i class="fa fa-mobile"></i>
                    </div>

                    <div class="card-info">
                        <h3>Sản phẩm</h3>
                        <p>120</p>
                    </div>

                </div>


                <div class="card users">

                    <div class="card-icon">
                        <i class="fa fa-users"></i>
                    </div>

                    <div class="card-info">
                        <h3>Khách hàng</h3>
                        <p>85</p>
                    </div>

                </div>

            </div>

            <div class="charts">

                <!-- BIỂU ĐỒ DOANH THU -->
                <div class="chart-box">

                    <h2>Biểu đồ doanh thu theo tháng</h2>

                    <canvas id="revenueChart"></canvas>

                </div>


                <!-- BIỂU ĐỒ SẢN PHẨM -->
                <div class="chart-box">

                    <h2>Thống kê sản phẩm theo hãng</h2>

                    <canvas id="productChart"></canvas>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>

        // BIỂU ĐỒ DOANH THU

        const revenueCtx = document.getElementById('revenueChart');

        new Chart(revenueCtx, {

            type: 'line',

            data: {

                labels: ['T1', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'],

                datasets: [{

                    label: 'Doanh thu (VNĐ)',

                    data: [20000000, 35000000, 15000000, 50000000, 42000000, 70000000, 65000000],

                    borderColor: '#3b82f6',

                    backgroundColor: 'rgba(59,130,246,0.2)',

                    fill: true,

                    tension: 0.4

                }]

            },

            options: {

                responsive: true,

                plugins: {
                    legend: {
                        display: true
                    }
                }

            }

        });


        // BIỂU ĐỒ SẢN PHẨM

        const productCtx = document.getElementById('productChart');

        new Chart(productCtx, {

            type: 'bar',

            data: {

                labels: ['Apple', 'Samsung', 'Xiaomi', 'Oppo', 'Vivo'],

                datasets: [{

                    label: 'Số lượng sản phẩm',

                    data: [25, 18, 12, 10, 8],

                    backgroundColor: [

                        '#3b82f6',
                        '#10b981',
                        '#f59e0b',
                        '#ef4444',
                        '#8b5cf6'

                    ]

                }]

            },

            options: {

                responsive: true,

                plugins: {
                    legend: {
                        display: false
                    }
                }

            }

        });

    </script>
</body>

</html>
