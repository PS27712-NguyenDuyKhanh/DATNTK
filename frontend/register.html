<!DOCTYPE html>
<html>

<head>
    <title>Register - PhoneStore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<div class="col-md-5 mx-auto">

<h2 class="mb-4">Create Account</h2>

<div id="message"></div>

<div class="mb-3">
    <label>Email</label>
    <input id="email" class="form-control" placeholder="Enter email">
</div>

<button onclick="sendOtp()" class="btn btn-primary mb-3">
Send OTP
</button>

<div class="mb-3">
    <label>OTP</label>
    <input id="otp" class="form-control" placeholder="Enter OTP" disabled>
</div>

<button onclick="verifyOtp()" id="verifyBtn" class="btn btn-success mb-3" disabled>
Verify OTP
</button>

<div class="mb-3">
    <label>Password</label>
    <input id="password" type="password" class="form-control" placeholder="Create password" disabled>
</div>

<button onclick="createPassword()" id="createBtn" class="btn btn-dark" disabled>
Create Account
</button>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>

</html>
